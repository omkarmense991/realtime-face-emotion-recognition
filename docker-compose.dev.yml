services:

  backend:

    build: .

    ports:
      - "8000:8000"

    depends_on:
      - db

    volumes:
      - .:/app

    env_file:
      - .env

    command:
      [
        "uvicorn",
        "src.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]


  frontend:

    build: ./frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command:
      ["npm", "run", "dev", "--", "--host"]


  db:

    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ferdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: