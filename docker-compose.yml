
services:

  backend:

    build: .

    ports:
      - "8000:8000"

    depends_on:
      - db

    volumes:
      - .:/app

  db:

    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ferdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: